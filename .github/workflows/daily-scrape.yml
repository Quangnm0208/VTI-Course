name: Daily ItViec Scrape

# Cron: 00:00 UTC = 07:00 VN (giờ Việt Nam), chạy mỗi ngày
# Có thể trigger tay qua tab Actions trên GitHub (workflow_dispatch)
on:
  schedule:
    - cron: '0 0 * * *'        # 07:00 VN hàng ngày
  workflow_dispatch:
    inputs:
      pages:
        description: 'Số trang tối đa cần cào'
        required: false
        default: '30'
      enrich:
        description: 'Số job đầu fetch detail để lấy salary (0 = bỏ qua)'
        required: false
        default: '200'

# Đảm bảo không có 2 lần scrape chạy chồng lên nhau (tránh xung đột git push)
concurrency:
  group: itviec-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write           # cần để commit & push CSV về repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        # --with-deps tự cài các thư viện hệ thống cần thiết (libnss3, libatk...)
        run: python -m playwright install --with-deps chromium

      - name: Run scraper (Playwright + enrich detail để có salary thật)
        env:
          PAGES: ${{ github.event.inputs.pages || '30' }}
          # Enrich 200 job đầu để lấy salary từ JSON-LD (~6 phút trên runner)
          ENRICH: ${{ github.event.inputs.enrich || '200' }}
        run: |
          python scripts/scrape_itviec.py \
            --pages "$PAGES" \
            --engine playwright \
            --enrich-details "$ENRICH"
        # Không fail workflow nếu scrape thiếu - job quality sẽ alert
        continue-on-error: true

      - name: Run cleanup
        run: python scripts/cleanup_csv.py --apply

      - name: Commit & push CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/itviec_jobs.csv
          if git diff --staged --quiet; then
            echo "Không có thay đổi để commit."
            exit 0
          fi
          DATE_VN=$(TZ='Asia/Ho_Chi_Minh' date +'%Y-%m-%d')
          git commit -m "data: ItViec scrape $DATE_VN"

          # Retry push 3 lần với rebase (xử lý race condition khi nhiều workflow cùng push)
          for attempt in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push; then
              echo "Push thành công lần thử $attempt"
              exit 0
            fi
            echo "Push lần $attempt thất bại - sleep rồi thử lại"
            sleep $((attempt * 3))
          done
          echo "Push thất bại sau 3 lần thử"
          exit 1

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: itviec-jobs-${{ github.run_id }}
          path: data/itviec_jobs.csv
          retention-days: 14
